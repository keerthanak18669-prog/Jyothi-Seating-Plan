<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candidate Seating Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
overflow-x:hidden;

background:
radial-gradient(circle at 10% 20%, #e0e7ff 0%, transparent 40%),
radial-gradient(circle at 90% 80%, #dbeafe 0%, transparent 40%),
#f8fafc;

color:#1f2937;
}

/* HEADER */

header{
position:sticky;
top:0;
background:white;
padding:14px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
border-bottom:1px solid #e5e7eb;
z-index:10;
}

header h1{
margin:0;
font-size:17px;
color:#1e3a8a;
}

header h2{
margin:3px 0;
font-size:14px;
color:#2563eb;
}

.meta{
font-size:12px;
color:#64748b;
}

/* WRAPPER */

.wrapper{
max-width:520px;
margin:auto;
padding:20px 18px 120px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#64748b;
margin-bottom:14px;
}

/* SEARCH */

.search-card{
background:white;
padding:16px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.06);
margin-bottom:14px;
}

.search{
display:flex;
gap:8px;
}

.search input{
flex:1;
padding:12px;
font-size:13px;
border-radius:8px;
border:1px solid #cbd5f5;
outline:none;
}

.search button{
padding:12px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

/* RESULT CARD */

.details{
margin-top:10px;
background:white;
border-radius:14px;
padding:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.student-name{
font-size:16px;
font-weight:600;
margin-bottom:12px;
color:#1e3a8a;
text-align:center;
}

/* GRID DETAILS */

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
font-size:13px;
}

.info-box{
background:#f8fafc;
padding:8px;
border-radius:8px;
}

/* REPORT BOX */

.report-box{
margin-top:10px;
padding:10px;
background:#eff6ff;
border-left:4px solid #2563eb;
border-radius:8px;
font-size:13px;
}

/* WARNING */

.warning{
padding:12px;
background:#fff7ed;
color:#9a3412;
border-left:4px solid #f97316;
border-radius:8px;
text-align:center;
font-size:13px;
}

/* ERROR */

.error{
padding:12px;
background:#fff1f2;
color:#7f1d1d;
border-radius:8px;
text-align:center;
font-size:13px;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
width:100%;
background:white;
border-top:1px solid #e5e7eb;
text-align:center;
padding:10px;
font-size:11px;
color:#6b7280;
}

</style>

</head>

<body>

<header>
<h1>BITS Examination (Jyothi Institute of Technology)</h1>
<h2>Candidate Seating Portal</h2>

</div>

<div id="output"></div>

</div>

<footer>
Candidate Seating System | Developed by Keerthana
</footer>

/* FLOOR FORMAT */

function getOrdinal(n){

n=parseInt(n);

if(n%100>=11 && n%100<=13) return n+"th";

switch(n%10){

case 1:return n+"st";
case 2:return n+"nd";
case 3:return n+"rd";
default:return n+"th";

}

}

/* SEARCH */

function search(){

const id=document.getElementById("idInput").value.trim();
const out=document.getElementById("output");

out.innerHTML="";

if(!id){

out.innerHTML=`<div class="warning">⚠️ Please enter your Candidate ID</div>`;
return;

}

const s=data[id];

if(!s){

out.innerHTML=`<div class="error">❌ Candidate ID not found.<br>Please enquire in First floor</div>`;
return;

}

out.innerHTML=`

<div class="details">

<div class="student-name">👋 ${s.name}</div>

<div class="info-grid">

<div class="info-box"><strong>System:</strong> ${s.system}</div>
<div class="info-box"><strong>Lab:</strong> ${s.lab}</div>
<div class="info-box"><strong>Floor:</strong> ${getOrdinal(s.floor)}</div>

<div class="info-box"><strong>Program:</strong> ${s.program}</div>
<div class="info-box"><strong>Sub Program:</strong> ${s.subprogram}</div>

</div>

</div>

</div>

`;

}

document.getElementById("idInput").addEventListener("keypress",function(e){

if(e.key==="Enter"){
search();
}
